title: Contruí un linktr.ee ¿de que sirvió?
description: Por qué este proyecto me sirvió a mí. Que aprendí?, hasta donde llegué.
body: | 

 <article>

  <p><a href="https://generador-links.vercel.app/" target="_blank">Demo</a> <br/> <a href="https://github.com/L3anAv/generador-links" target="_blank">Repositorio del proyecto</a></p>

  <p>Este proyecto llegó a mí estando en <strong>Twitter</strong>, cuando leí de hacer un proyecto de app que te dé los archivos para subir una web de links simil linktr.ee. En ese entonces, lo hice para <strong>CLI</strong> y funcionó; me gustó y aprendí el flujo de las herramientas de terminal, pero no quedé conforme con que solo pudiera ser usado así.</p>

  <p>Mi conocimiento anterior a empezar el proyecto, fue haber hecho, por ejemplo, un editor de archivos <strong>README</strong> con <strong>AsciiDoc</strong> (estilo <a href="http://readme.so">readme.so</a>), pero eso se quedaba en el <strong>frontend</strong>, y esto me aportaba además crear y desplegar <strong>backend</strong>. Entonces lo hice para entender mejor el flujo del <strong>front al back</strong>, lo que me forzó a utilizar herramientas con las que no había tenido contacto antes, como <strong>Docker</strong>, entre otras.</p>

  <p>La tarea de pasar de la version de <strong>CLI</strong> a una <strong>Web App</strong> implicó resolver muchos problemas interesantes en el camino. En este artículo desarrollo algunos.</p>

  <p>Lo primero es como el <strong>CLI</strong> estaba escrito en <strong>Python</strong>, decidí hacer la <strong>API REST</strong> con <strong>Flask</strong> para aprovechar lo que tenía ya hecho; pero tuve problemas de ejecución en "producción" (y que hoy entiendo, gracias a la <strong>IA</strong> que ayuda a comprender más fácilmente), debido a cómo Flask maneja el inicio del servicio. Reescribí todo con <strong>Node.js</strong>, que tenía una documentación más clara para mí, y que al usar <strong>JavaScript</strong> yo no era ajeno a él, por <strong>React</strong>.</p>

  <p>Luego tuve problemas al no poder aplicar estilos que se comportaran igual tanto en los <cite style="color: red;">selects</cite> como en <cite style="color: red;">inputs</cite>; solucioné esto usando con una librería para <strong>React</strong> especifica para controlar mejor todo lo referido a selects.</p>

  <p>En el <strong>backend</strong> tuve problemas con las rutas locales de archivos en el contenedor desplegado en <strong>Render</strong>. Al no poder usar la terminal para ver el árbol de archivos, o explorar las rutas, tuve que ir revisando con <strong>logs</strong> que inserte dentro del programa, para entender cómo estaban construidas las rutas hasta dar con la correcta, ya que las dinámicas no funcionaban como esperaba o no apuntaban a donde quería.</p>

  <p>Por último, otro de los que recuerdo fue tener problemas con el famoso <strong>CORS</strong>. Al final, mi solución para no complicarme la vida fue poner el clásico <strong>origin *</strong>. Al no controlar el flujo de conexión entre <strong>Vercel</strong> y <strong>Render</strong>, decidí no complicarme; para un proyecto público y práctico personal me sirvió, pero entiendo que a nivel de seguridad no es lo óptimo.</p>

  <p>En conclusión, fue un proyecto que tuvo problemas no esperados, como siempre, y en donde si bien no lo planteé desde un principio bien, aprendí a resolver problemas reales. Quizás uno de mis grandes fallos, y donde más tiempo perdí, fue en no pensarlo más antes de programar y no tomar las decisiones importantes previamente. Más allá de eso, fue interesante y mi primer acercamiento al <strong>backend</strong>.</p>
  </article>
